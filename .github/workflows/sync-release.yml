name: Sync Formula From Nodus Release

on:
  repository_dispatch:
    types:
      - nodus_release_published
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing nodus release tag to sync
        required: true
        type: string

permissions:
  contents: write

jobs:
  sync-formula:
    runs-on: ubuntu-latest

    env:
      RELEASE_TAG: ${{ inputs.tag_name || github.event.client_payload.tag_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch || github.ref_name }}

      - name: Update formula
        shell: bash
        run: ./scripts/update-formula.sh "${RELEASE_TAG}"

      - name: Set up git identity
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and push formula update
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet; then
            echo "No formula changes to commit."
            exit 0
          fi

          git add Formula
          git commit -m "Update formula for ${RELEASE_TAG}"
          git push
